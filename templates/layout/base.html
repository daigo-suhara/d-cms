<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .title }}{{ .title }} — {{ end }}Headless CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Inter','Segoe UI','Roboto','sans-serif'] }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  <style>
    /* EasyMDE */
    .EasyMDEContainer .CodeMirror { border-radius: 0 0 6px 6px !important; border-color: #d1d5db !important; font-size: 14px; }
    .EasyMDEContainer .editor-toolbar { border-color: #d1d5db !important; border-radius: 6px 6px 0 0 !important; background: #f9fafb !important; }
    .EasyMDEContainer .editor-toolbar button { color: #6b7280 !important; }
    .EasyMDEContainer .editor-toolbar button:hover { background: #e5e7eb !important; color: #111827 !important; }
    .EasyMDEContainer .editor-statusbar { color: #9ca3af; font-size: 11px; }
    .EasyMDEContainer { margin-top: 0 !important; }
  </style>
</head>
<body class="bg-slate-100 flex min-h-screen font-sans text-sm text-slate-800 antialiased">

  <!-- ── Sidebar ───────────────────────────────── -->
  <aside class="fixed inset-y-0 left-0 w-56 bg-white border-r border-slate-200 flex flex-col z-50">

    <!-- Logo -->
    <a href="/admin/content-models" class="flex items-center gap-2.5 px-5 py-4 border-b border-slate-200 font-bold text-[15px] text-slate-900 tracking-tight hover:bg-slate-50 transition-colors">
      <svg class="text-blue-600 shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      Headless CMS
    </a>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-3 space-y-0.5">
      <p class="px-2 pt-2 pb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-400">コンテンツ</p>
      <a href="/admin/content-models"
         class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-md text-slate-500 font-medium hover:bg-slate-100 hover:text-slate-900 transition-colors"
         data-match="/admin/content-models">
        <svg class="w-4 h-4 shrink-0 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Content Models
      </a>

      <p class="px-2 pt-4 pb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-400">アセット</p>
      <a href="/admin/media"
         class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-md text-slate-500 font-medium hover:bg-slate-100 hover:text-slate-900 transition-colors"
         data-match="/admin/media">
        <svg class="w-4 h-4 shrink-0 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        Media
      </a>
    </nav>

    <!-- Logout -->
    <div class="px-3 py-3 border-t border-slate-200">
      <form method="POST" action="/admin/logout">
        <button type="submit" class="flex items-center gap-2.5 w-full px-3 py-2 rounded-md text-slate-500 font-medium hover:bg-red-50 hover:text-red-500 transition-colors">
          <svg class="w-4 h-4 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </form>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────── -->
  <div class="ml-56 flex-1 flex flex-col min-h-screen">

    <!-- Top bar -->
    <header class="sticky top-0 z-40 bg-white border-b border-slate-200 h-13 flex items-center px-7" style="height:52px;">
      <span class="text-[15px] font-semibold text-slate-900">{{ if .title }}{{ .title }}{{ else }}Headless CMS{{ end }}</span>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-7">
      {{ template "content" . }}
    </main>
  </div>

  <script>
    (function() {
      const path = window.location.pathname;
      document.querySelectorAll('.nav-item[data-match]').forEach(function(el) {
        const match = el.getAttribute('data-match');
        if (path === match || path.startsWith(match + '/')) {
          el.classList.remove('text-slate-500');
          el.classList.add('bg-blue-50', 'text-blue-600');
          const icon = el.querySelector('svg');
          if (icon) { icon.classList.remove('text-slate-400'); icon.classList.add('text-blue-500'); }
        }
      });
      if (path.match(/^\/admin\/[^\/]+\/entries/)) {
        const cm = document.querySelector('.nav-item[data-match="/admin/content-models"]');
        if (cm) {
          cm.classList.remove('text-slate-500');
          cm.classList.add('bg-blue-50', 'text-blue-600');
          const icon = cm.querySelector('svg');
          if (icon) { icon.classList.remove('text-slate-400'); icon.classList.add('text-blue-500'); }
        }
      }
    })();
  </script>
</body>
</html>
