<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .title }}{{ .title }} — {{ end }}d-cms</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Inter','Segoe UI','Roboto','sans-serif'] },
          transitionProperty: { 'width': 'width' }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  <style type="text/tailwindcss">
    @layer components {
      /* ── Buttons ── */
      .btn-primary   { @apply inline-flex items-center gap-1.5 px-3.5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors; }
      .btn-blue      { @apply px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors; }
      .btn-secondary { @apply px-4 py-2 border border-slate-300 text-slate-600 text-sm font-medium rounded-lg hover:bg-slate-50 transition-colors; }
      .btn-sm-edit   { @apply inline-flex items-center whitespace-nowrap px-2.5 py-1 text-xs font-medium border border-slate-300 text-slate-600 rounded-md hover:bg-slate-50 transition-colors; }
      .btn-sm-delete { @apply inline-flex items-center whitespace-nowrap px-2.5 py-1 text-xs font-medium border border-red-200 text-red-500 rounded-md hover:bg-red-50 transition-colors; }
      /* ── Cards ── */
      .card        { @apply bg-white border border-slate-200 rounded-xl overflow-hidden; }
      .card-header { @apply px-5 py-3.5 border-b border-slate-200 text-sm font-semibold text-slate-700; }
      .card-body   { @apply p-5; }
      .card-footer { @apply px-5 py-4 border-t border-slate-200 bg-slate-50 flex gap-2; }
      /* ── Table ── */
      .th { @apply px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider text-slate-400 bg-slate-50; }
      .td { @apply px-5 py-3.5; }
      /* ── Forms ── */
      .form-input { @apply w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100 placeholder:text-slate-300; }
      .form-label { @apply block text-sm font-medium text-slate-700 mb-1.5; }
      /* ── Feedback ── */
      .alert-error { @apply flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5; }
      /* ── Layout ── */
      .page-header { @apply flex items-center justify-between mb-5; }
      .page-title  { @apply text-xl font-bold text-slate-900 tracking-tight; }
      .breadcrumb  { @apply flex items-center gap-1.5 text-xs text-slate-400 mb-1; }
      .empty-state { @apply bg-white border border-slate-200 rounded-xl py-16 text-center; }
    }
  </style>
  <style>
    [x-cloak] { display: none !important; }
    /* EasyMDE */
    .EasyMDEContainer .CodeMirror { border-radius: 0 0 6px 6px !important; border-color: #d1d5db !important; font-size: 14px; }
    .EasyMDEContainer .editor-toolbar { border-color: #d1d5db !important; border-radius: 6px 6px 0 0 !important; background: #f9fafb !important; }
    .EasyMDEContainer .editor-toolbar button { color: #6b7280 !important; }
    .EasyMDEContainer .editor-toolbar button:hover { background: #e5e7eb !important; color: #111827 !important; }
    .EasyMDEContainer .editor-statusbar { color: #9ca3af; font-size: 11px; }
    .EasyMDEContainer { margin-top: 0 !important; }
    /* Sidebar transition */
    .sidebar { transition: width 0.2s ease; }
    .main-wrapper { transition: margin-left 0.2s ease; }
    .nav-label { transition: opacity 0.15s ease, width 0.2s ease; }
    .section-label { transition: opacity 0.15s ease; }
  </style>
</head>
<body class="bg-slate-100 flex min-h-screen font-sans text-sm text-slate-800 antialiased"
      x-data="sidebarApp()"
      x-cloak>

  <!-- ── Sidebar ───────────────────────────────── -->
  <aside class="sidebar fixed inset-y-0 left-0 bg-white border-r border-slate-200 flex flex-col z-50 overflow-hidden"
         :style="collapsed ? 'width:56px' : 'width:220px'">

    <!-- Toggle -->
    <div class="flex items-center border-b border-slate-200 shrink-0 h-[52px]"
         :class="collapsed ? 'justify-center' : 'px-3'">
      <button @click="toggle()"
              class="p-1.5 rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"
              :title="collapsed ? 'サイドバーを開く' : 'サイドバーを閉じる'">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-3 overflow-y-auto overflow-x-hidden"
         :class="collapsed ? 'px-2' : 'px-3'">

      <!-- セクション: コンテンツ -->
      <p class="section-label px-2 pt-1 pb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-400 whitespace-nowrap overflow-hidden"
         :style="collapsed ? 'opacity:0; height:0; margin:0; padding:0' : 'opacity:1'">コンテンツ</p>

      <a href="/admin/content-models"
         class="nav-item flex items-center rounded-md text-slate-500 font-medium hover:bg-slate-100 hover:text-slate-900 transition-colors mb-0.5 overflow-hidden"
         :class="collapsed ? 'justify-center p-3' : 'gap-2.5 px-3 py-2'"
         data-match="/admin/content-models"
         :title="collapsed ? 'コンテンツモデル' : ''">
        <svg class="w-[18px] h-[18px] shrink-0 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label whitespace-nowrap overflow-hidden"
              :style="collapsed ? 'opacity:0; width:0' : 'opacity:1; width:auto'">
          コンテンツモデル
        </span>
      </a>

      <!-- セクション: アセット -->
      <p class="section-label px-2 pb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-400 whitespace-nowrap overflow-hidden"
         :style="collapsed ? 'opacity:0; height:0; margin:0; padding:0' : 'opacity:1; margin-top:12px'">アセット</p>

      <a href="/admin/media"
         class="nav-item flex items-center rounded-md text-slate-500 font-medium hover:bg-slate-100 hover:text-slate-900 transition-colors mb-0.5 overflow-hidden"
         :class="collapsed ? 'justify-center p-3' : 'gap-2.5 px-3 py-2'"
         data-match="/admin/media"
         :title="collapsed ? 'メディア' : ''">
        <svg class="w-[18px] h-[18px] shrink-0 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="nav-label whitespace-nowrap overflow-hidden"
              :style="collapsed ? 'opacity:0; width:0' : 'opacity:1; width:auto'">
          メディア
        </span>
      </a>

      <!-- セクション: 開発者 -->
      <p class="section-label px-2 pb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-400 whitespace-nowrap overflow-hidden"
         :style="collapsed ? 'opacity:0; height:0; margin:0; padding:0' : 'opacity:1; margin-top:12px'">開発者</p>

      <a href="/admin/api-keys"
         class="nav-item flex items-center rounded-md text-slate-500 font-medium hover:bg-slate-100 hover:text-slate-900 transition-colors mb-0.5 overflow-hidden"
         :class="collapsed ? 'justify-center p-3' : 'gap-2.5 px-3 py-2'"
         data-match="/admin/api-keys"
         :title="collapsed ? 'APIキー' : ''">
        <svg class="w-[18px] h-[18px] shrink-0 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
        <span class="nav-label whitespace-nowrap overflow-hidden"
              :style="collapsed ? 'opacity:0; width:0' : 'opacity:1; width:auto'">
          APIキー
        </span>
      </a>

      <a href="/admin/backups"
         class="nav-item flex items-center rounded-md text-slate-500 font-medium hover:bg-slate-100 hover:text-slate-900 transition-colors mb-0.5 overflow-hidden"
         :class="collapsed ? 'justify-center p-3' : 'gap-2.5 px-3 py-2'"
         data-match="/admin/backups"
         :title="collapsed ? 'バックアップ' : ''">
        <svg class="w-[18px] h-[18px] shrink-0 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span class="nav-label whitespace-nowrap overflow-hidden"
              :style="collapsed ? 'opacity:0; width:0' : 'opacity:1; width:auto'">
          バックアップ
        </span>
      </a>
    </nav>

    <!-- Logout -->
    <div class="border-t border-slate-200 shrink-0"
         :class="collapsed ? 'p-2' : 'p-3'">
      <form method="POST" action="/admin/logout">
        <button type="submit"
                class="flex items-center rounded-md text-slate-500 font-medium hover:bg-red-50 hover:text-red-500 transition-colors w-full overflow-hidden"
                :class="collapsed ? 'justify-center p-3' : 'gap-2.5 px-3 py-2'"
                :title="collapsed ? 'ログアウト' : ''">
          <svg class="w-[18px] h-[18px] shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="nav-label whitespace-nowrap overflow-hidden"
                :style="collapsed ? 'opacity:0; width:0' : 'opacity:1; width:auto'">
            ログアウト
          </span>
        </button>
      </form>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────── -->
  <div class="main-wrapper flex-1 flex flex-col min-h-screen"
       :style="collapsed ? 'margin-left:56px' : 'margin-left:220px'">

    <!-- Top bar -->
    <header class="sticky top-0 z-40 bg-white border-b border-slate-200 flex items-center px-7" style="height:52px;">
      <span class="text-[15px] font-semibold text-slate-900">{{ if .title }}{{ .title }}{{ else }}d-cms{{ end }}</span>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-7">
      {{ template "content" . }}
    </main>
  </div>

  <!-- ── Confirm Modal ────────────────────────── -->
  <div x-data="confirmModal()"
       @open-confirm.window="open($event.detail)"
       x-show="isOpen"
       x-cloak
       class="fixed inset-0 z-[200] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="close()"></div>
    <!-- Card -->
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-sm p-6"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95">
      <!-- Icon -->
      <div class="flex items-center justify-center w-11 h-11 rounded-full bg-red-50 mb-4">
        <svg class="w-5 h-5 text-red-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </div>
      <!-- Message -->
      <h3 class="text-[15px] font-semibold text-slate-900 mb-1.5" x-text="title"></h3>
      <p class="text-sm text-slate-500 mb-6" x-text="message"></p>
      <!-- Actions -->
      <div class="flex gap-2.5 justify-end">
        <button @click="close()"
                class="px-4 py-2 text-sm font-medium border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors">
          キャンセル
        </button>
        <button @click="confirm()"
                class="px-4 py-2 text-sm font-medium bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors">
          削除する
        </button>
      </div>
    </div>
  </div>

  <!-- ── Media Picker Modal ─────────────────────── -->
  <div x-data
       x-show="$store.mediaPicker.isOpen"
       x-cloak
       class="fixed inset-0 z-[300] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="$store.mediaPicker.close()"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-2xl flex flex-col"
         style="max-height: 80vh;"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95">
      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200 shrink-0">
        <h3 class="text-[15px] font-semibold text-slate-900">メディアライブラリ</h3>
        <button @click="$store.mediaPicker.close()"
                class="p-1.5 rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors">
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <!-- Upload bar -->
      <div class="px-5 py-3 border-b border-slate-100 shrink-0 bg-slate-50">
        <form @submit.prevent="$store.mediaPicker.uploadFile($event)" class="flex gap-2 items-center">
          <input type="file" name="file" accept="image/*"
                 class="flex-1 text-xs text-slate-600 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-medium file:bg-white file:text-slate-700 file:border file:border-slate-300 hover:file:bg-slate-50 cursor-pointer">
          <button type="submit"
                  class="shrink-0 px-3 py-1.5 text-xs font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-md transition-colors"
                  :disabled="$store.mediaPicker.uploading"
                  x-text="$store.mediaPicker.uploading ? 'アップロード中...' : 'アップロード'">
          </button>
        </form>
        <p x-show="$store.mediaPicker.uploadError" x-text="$store.mediaPicker.uploadError"
           class="mt-1.5 text-xs text-red-500"></p>
      </div>
      <!-- Body -->
      <div class="flex-1 overflow-y-auto p-5">
        <!-- Loading -->
        <div x-show="$store.mediaPicker.loading" class="flex items-center justify-center py-12 text-sm text-slate-400">
          読み込み中...
        </div>
        <!-- Empty -->
        <div x-show="!$store.mediaPicker.loading && $store.mediaPicker.media.length === 0"
             class="flex flex-col items-center justify-center py-12 text-sm text-slate-400">
          <svg class="w-8 h-8 mb-2 text-slate-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          メディアがありません。上からアップロードしてください。
        </div>
        <!-- Grid -->
        <div x-show="!$store.mediaPicker.loading && $store.mediaPicker.media.length > 0"
             class="grid gap-3" style="grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));">
          <template x-for="m in $store.mediaPicker.media" :key="m.id">
            <button type="button"
                    @click="$store.mediaPicker.select(m)"
                    class="group rounded-xl border border-slate-200 overflow-hidden hover:border-blue-400 hover:shadow-md transition-all text-left bg-white">
              <div class="h-24 bg-slate-50 flex items-center justify-center overflow-hidden">
                <template x-if="m.mime_type && m.mime_type.startsWith('image/')">
                  <img :src="m.url" :alt="m.filename" class="w-full h-full object-cover">
                </template>
                <template x-if="!m.mime_type || !m.mime_type.startsWith('image/')">
                  <span class="text-2xl">📄</span>
                </template>
              </div>
              <div class="px-2 py-1.5">
                <p class="text-[11px] font-medium text-slate-700 truncate" x-text="m.filename"></p>
              </div>
            </button>
          </template>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.store('mediaPicker', {
        isOpen: false,
        loading: false,
        media: [],
        uploading: false,
        uploadError: '',
        open() {
          this.isOpen = true;
          this.uploadError = '';
          this.load();
        },
        close() {
          this.isOpen = false;
        },
        async load() {
          this.loading = true;
          try {
            const r = await fetch('/admin/media', { headers: { 'Accept': 'application/json' } });
            const data = await r.json();
            this.media = data.media || [];
          } catch(e) {
            this.media = [];
          } finally {
            this.loading = false;
          }
        },
        select(m) {
          if (window._activeMde) {
            const cm = window._activeMde.codemirror;
            const isImg = m.mime_type && m.mime_type.startsWith('image/');
            const text = isImg ? `![${m.filename}](${m.url})` : `[${m.filename}](${m.url})`;
            cm.replaceSelection(text);
          }
          this.close();
        },
        async uploadFile(e) {
          const form = e.target;
          const fileInput = form.querySelector('input[type=file]');
          if (!fileInput.files.length) return;
          this.uploading = true;
          this.uploadError = '';
          const fd = new FormData();
          fd.append('file', fileInput.files[0]);
          try {
            const r = await fetch('/admin/media/upload', {
              method: 'POST',
              headers: { 'Accept': 'application/json' },
              body: fd,
            });
            if (!r.ok) throw new Error('アップロードに失敗しました');
            fileInput.value = '';
            await this.load();
          } catch(e) {
            this.uploadError = e.message;
          } finally {
            this.uploading = false;
          }
        },
      });
    });

    function confirmModal() {
      return {
        isOpen: false,
        title: '削除の確認',
        message: '',
        targetEl: null,
        open(detail) {
          this.title = detail.title || '削除の確認';
          this.message = detail.message || '本当に削除しますか？この操作は取り消せません。';
          this.targetEl = detail.el;
          this.isOpen = true;
        },
        confirm() {
          if (this.targetEl) {
            this.targetEl.dispatchEvent(new Event('confirmed'));
          }
          this.close();
        },
        close() {
          this.isOpen = false;
          this.targetEl = null;
        }
      }
    }

    function sidebarApp() {
      return {
        collapsed: localStorage.getItem('sidebar-collapsed') !== 'false',
        toggle() {
          this.collapsed = !this.collapsed;
          localStorage.setItem('sidebar-collapsed', this.collapsed);
        },
        init() {
          // アクティブナビ
          const path = window.location.pathname;
          this.$nextTick(() => {
            document.querySelectorAll('.nav-item[data-match]').forEach(el => {
              const match = el.getAttribute('data-match');
              if (path === match || path.startsWith(match + '/')) {
                el.classList.remove('text-slate-500');
                el.classList.add('bg-blue-50', 'text-blue-600');
                el.querySelectorAll('svg').forEach(svg => {
                  svg.classList.remove('text-slate-400');
                  svg.classList.add('text-blue-500');
                });
              }
            });
            if (path.match(/^\/admin\/[^\/]+\/entries/)) {
              const cm = document.querySelector('.nav-item[data-match="/admin/content-models"]');
              if (cm) {
                cm.classList.remove('text-slate-500');
                cm.classList.add('bg-blue-50', 'text-blue-600');
                cm.querySelectorAll('svg').forEach(svg => {
                  svg.classList.remove('text-slate-400');
                  svg.classList.add('text-blue-500');
                });
              }
            }
          });
        }
      }
    }
  </script>
</body>
</html>
