{{ define "content" }}
<div class="mb-6">
  <div class="breadcrumb">
    <a href="/admin/content-models" class="hover:text-blue-600 transition-colors">コンテンツモデル</a>
    <span>/</span>
    <span>{{ if eq .action "create" }}新規作成{{ else }}編集{{ end }}</span>
  </div>
  <h1 class="page-title">
    {{ if eq .action "create" }}新規コンテンツモデル{{ else }}編集: {{ .model.Name }}{{ end }}
  </h1>
</div>

{{ if .error }}
<div class="alert-error">
  <svg class="w-4 h-4 mt-0.5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  {{ .error }}
</div>
{{ end }}

<form
  {{ if eq .action "create" }}
    method="POST" action="/admin/content-models"
  {{ else }}
    method="POST" action="/admin/content-models/{{ .model.ID }}"
  {{ end }}
  x-data="fieldBuilder({{ fieldsJSON .model.Fields }})">

  <div class="grid grid-cols-2 gap-5 items-start">

    <!-- 基本情報 -->
    <div class="card">
      <div class="card-header">基本情報</div>
      <div class="card-body space-y-4">
        <div>
          <label class="form-label">
            名前 <span class="text-red-500">*</span>
          </label>
          <input type="text" name="name" value="{{ .model.Name }}" required placeholder="ブログ記事"
            class="form-input">
        </div>
        <div>
          <label class="form-label" style="margin-bottom:4px">スラッグ</label>
          <input type="text" name="slug" value="{{ .model.Slug }}" required placeholder="blog-post" pattern="[a-z0-9-]+"
            class="form-input font-mono">
          <p class="mt-1 text-xs text-slate-400">半角英数字・ハイフンのみ使用できます</p>
        </div>
        <div class="flex gap-2 pt-1">
          <button type="submit" class="btn-blue">
            {{ if eq .action "create" }}作成する{{ else }}変更を保存{{ end }}
          </button>
          <a href="/admin/content-models" class="btn-secondary">キャンセル</a>
        </div>
      </div>
    </div>

    <!-- フィールド定義 -->
    <div class="card">
      <div class="card-header flex items-center justify-between">
        <span>フィールド定義</span>
        <button type="button" @click="addField()"
          class="inline-flex items-center gap-1 px-2.5 py-1.5 border border-slate-300 text-slate-600 text-xs font-medium rounded-md hover:bg-slate-50 transition-colors">
          <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          フィールドを追加
        </button>
      </div>
      <div class="card-body">
        <input type="hidden" name="fields_json" :value="JSON.stringify(fields)">

        <template x-if="fields.length === 0">
          <div class="border border-dashed border-slate-200 rounded-lg py-8 text-center text-sm text-slate-400">
            フィールドがありません
          </div>
        </template>

        <div class="space-y-2">
          <template x-for="(field, index) in fields" :key="index">
            <div class="grid gap-2 p-3 bg-slate-50 border border-slate-200 rounded-lg" style="grid-template-columns: 1fr 130px auto auto; align-items: center;">
              <input
                type="text"
                placeholder="field_name"
                x-model="field.name"
                required
                class="px-2.5 py-1.5 text-xs font-mono border border-slate-300 rounded-md outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-100 bg-white">
              <select x-model="field.type"
                class="px-2 py-1.5 text-xs border border-slate-300 rounded-md outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-100 bg-white">
                <option value="text">テキスト</option>
                <option value="number">数値</option>
                <option value="date">日時</option>
                <option value="markdown">Markdown</option>
                <option value="tags">タグ</option>
              </select>
              <label class="flex items-center gap-1.5 cursor-pointer whitespace-nowrap">
                <input type="checkbox" x-model="field.required" class="w-3.5 h-3.5 accent-blue-600">
                <span class="text-xs text-slate-500">必須</span>
              </label>
              <button type="button" @click="removeField(index)"
                class="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors">
                <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
          </template>
        </div>
      </div>
    </div>

  </div>
</form>

<script>
function fieldBuilder(initial) {
  return {
    fields: initial || [],
    addField() {
      this.fields.push({ name: '', type: 'text', required: false });
    },
    removeField(index) {
      this.fields.splice(index, 1);
    }
  }
}
</script>
{{ end }}
