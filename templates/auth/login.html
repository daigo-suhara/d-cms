<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center antialiased">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-9">

      <!-- Logo -->
      <div class="flex items-center gap-2.5 mb-2">
        <svg class="text-blue-600 shrink-0" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span class="text-[17px] font-bold text-slate-900 tracking-tight">d-cms</span>
      </div>

      {{ if .error }}
      <div class="flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
        <svg class="w-4 h-4 mt-0.5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ .error }}
      </div>
      {{ end }}

      <form method="POST" action="/admin/login" class="space-y-5">
        <div>
          <label for="token" class="block text-sm font-medium text-slate-700 mb-1.5">管理トークン</label>
          <input
            type="password"
            id="token"
            name="token"
            placeholder="トークンを入力"
            required
            autofocus
            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100 placeholder:text-slate-300">
        </div>
        <button type="submit" class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition-colors">
          ログイン
        </button>
      </form>
    </div>
  </div>
</body>
</html>
