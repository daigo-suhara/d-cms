{{ define "content" }}
<div class="flex items-center justify-between mb-5">
  <h1 class="text-xl font-bold text-slate-900 tracking-tight">メディアライブラリ</h1>
  <button onclick="document.getElementById('upload-dialog').showModal()"
          class="inline-flex items-center gap-1.5 px-3.5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
    <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
    </svg>
    アップロード
  </button>
</div>

<!-- アップロードダイアログ -->
<dialog id="upload-dialog" style="border:none; border-radius:12px; padding:0; width:420px; max-width:calc(100vw - 32px); box-shadow: 0 20px 60px rgba(0,0,0,0.15);">
  <div style="padding: 24px 24px 0;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h3 style="font-size:16px; font-weight:700; color:#0f172a;">ファイルをアップロード</h3>
      <button onclick="document.getElementById('upload-dialog').close()"
              style="background:none; border:none; cursor:pointer; padding:4px; color:#94a3b8; font-size:20px; line-height:1; border-radius:4px;">✕</button>
    </div>
  </div>
  <form method="POST" action="/admin/media/upload" enctype="multipart/form-data" style="padding: 0 24px 24px;">
    <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">ファイルを選択</label>
    <input type="file" name="file" required
           style="display:block; width:100%; font-size:13px; padding:8px; border:1px solid #d1d5db; border-radius:6px; background:#f9fafb; cursor:pointer; outline:none;">
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:20px;">
      <button type="button" onclick="document.getElementById('upload-dialog').close()"
              style="padding:8px 16px; border:1px solid #d1d5db; background:#fff; color:#374151; font-size:13px; font-weight:500; border-radius:6px; cursor:pointer; font-family:inherit;">
        キャンセル
      </button>
      <button type="submit"
              style="padding:8px 16px; background:#2563eb; border:none; color:#fff; font-size:13px; font-weight:600; border-radius:6px; cursor:pointer; font-family:inherit;">
        アップロード
      </button>
    </div>
  </form>
</dialog>
<style>dialog::backdrop { background: rgba(15,23,42,0.5); backdrop-filter: blur(2px); }</style>

{{ if .media }}
<div class="grid gap-3" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));">
  {{ range .media }}
  <div id="media-{{ .ID }}" class="bg-white border border-slate-200 rounded-xl overflow-hidden hover:border-blue-300 hover:shadow-md transition-all group">
    <div class="h-28 bg-slate-50 flex items-center justify-center overflow-hidden">
      {{ if isImage .MimeType }}
      <img src="{{ .URL }}" alt="{{ .Filename }}" class="w-full h-full object-cover">
      {{ else }}
      <span class="text-3xl">📄</span>
      {{ end }}
    </div>
    <div class="p-2.5">
      <p class="text-xs font-medium text-slate-700 truncate mb-0.5" title="{{ .Filename }}">{{ .Filename }}</p>
      <p class="text-[11px] text-slate-400 mb-2">{{ formatSize .Size }}</p>
      <div class="flex gap-1">
        <a href="{{ .URL }}" target="_blank"
           class="flex-1 text-center px-1.5 py-1 text-[11px] font-medium border border-slate-200 text-slate-600 rounded-md hover:bg-slate-50 transition-colors">
          表示
        </a>
        <button
          hx-delete="/admin/media/{{ .ID }}"
          hx-target="#media-{{ .ID }}"
          hx-swap="outerHTML"
          hx-trigger="confirmed"
          @click="$dispatch('open-confirm', {
            message: 'このファイルを削除しますか？この操作は取り消せません。',
            el: $el
          })"
          class="flex-1 text-center px-1.5 py-1 text-[11px] font-medium border border-red-100 text-red-400 rounded-md hover:bg-red-50 hover:border-red-200 transition-colors">
          削除
        </button>
      </div>
    </div>
  </div>
  {{ end }}
</div>
{{ else }}
<div class="bg-white border border-slate-200 rounded-xl py-16 text-center">
  <svg class="w-10 h-10 mx-auto mb-3 text-slate-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
  </svg>
  <h3 class="text-sm font-semibold text-slate-600 mb-1">メディアファイルがありません</h3>
  <p class="text-sm text-slate-400">アップロードボタンからファイルを追加してください</p>
</div>
{{ end }}
{{ end }}
