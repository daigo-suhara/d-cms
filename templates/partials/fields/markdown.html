{{ define "field/markdown" }}
<div x-data x-init="
  const el = $el.querySelector('textarea');
  const mde = new EasyMDE({
    element: el,
    spellChecker: false,
    minHeight: '200px',
    toolbar: [
      'bold','italic','heading','|',
      'quote','unordered-list','ordered-list','|',
      'link',
      {
        name: 'media-library',
        action: function(editor) {
          window._activeMde = editor;
          Alpine.store('mediaPicker').open();
        },
        className: 'fa fa-image',
        title: 'メディアライブラリから画像を挿入',
      },
      '|','preview','fullscreen'
    ],
  });
">
  <textarea
    name="content[{{ .Field.Name }}]"
    placeholder="Write Markdown here...">{{ .Value }}</textarea>
</div>
{{ end }}
