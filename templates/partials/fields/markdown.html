{{ define "field/markdown" }}
<div x-data x-init="
  const el = $el.querySelector('textarea');
  new EasyMDE({
    element: el,
    spellChecker: false,
    minHeight: '200px',
    toolbar: ['bold','italic','heading','|','quote','unordered-list','ordered-list','|','link','image','|','preview','fullscreen']
  });
">
  <textarea
    name="content[{{ .Field.Name }}]"
    placeholder="Write Markdown here...">{{ .Value }}</textarea>
</div>
{{ end }}
