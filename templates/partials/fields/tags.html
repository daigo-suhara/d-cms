{{ define "field/tags" }}
<div
  x-data="{
    tags: {{ if .Value }}{{ jsonStringify .Value }}{{ else }}[]{{ end }},
    input: '',
    add() {
      const tag = this.input.trim();
      if (tag && !this.tags.includes(tag)) {
        this.tags.push(tag);
      }
      this.input = '';
    },
    remove(i) { this.tags.splice(i, 1); }
  }"
  class="space-y-2">
  <div class="flex flex-wrap gap-1.5 min-h-[2rem]">
    <template x-for="(tag, i) in tags" :key="i">
      <span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-medium bg-blue-100 text-blue-700 rounded-full">
        <span x-text="tag"></span>
        <button type="button" @click="remove(i)" class="hover:text-blue-900 leading-none">&times;</button>
        <input type="hidden" :name="'content[{{ .Field.Name }}][]'" :value="tag">
      </span>
    </template>
  </div>
  <div class="flex gap-2">
    <input
      type="text"
      x-model="input"
      @keydown.enter.prevent="add()"
      @keydown.comma.prevent="add()"
      {{ if and .Field.Required (eq (len .Value) 0) }}:required="tags.length === 0"{{ end }}
      placeholder="タグを入力して Enter"
      class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100 placeholder:text-slate-300">
    <button type="button" @click="add()" class="px-3 py-2 text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg transition">追加</button>
  </div>
</div>
{{ end }}
