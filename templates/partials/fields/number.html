{{ define "field/number" }}
<input
  type="number"
  step="any"
  name="content[{{ .Field.Name }}]"
  value="{{ .Value }}"
  {{ if .Field.Required }}required{{ end }}
  placeholder="0"
  class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100 placeholder:text-slate-300">
{{ end }}
